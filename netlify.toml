# Static HTML/CSS/JS — serve this folder as the site root.
# If Netlify still shows 404, open Site settings → Build & deploy and set
# “Publish directory” to the folder that contains this file (often "." or your repo subfolder name).

[build]
  publish = "."

[[redirects]]
  from = "/school-website-uganda"
  to = "/school-website-uganda.html"
  status = 200

[[redirects]]
  from = "/clinic-website-uganda"
  to = "/clinic-website-uganda.html"
  status = 200

[[redirects]]
  from = "/sacco-digital-services-uganda"
  to = "/sacco-digital-services-uganda.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/blog/google-ads-youtube-ads-uganda"
  to = "/blog/google-ads-youtube-ads-uganda.html"
  status = 200

[[redirects]]
  from = "/blog/school-website-marketing-uganda"
  to = "/blog/school-website-marketing-uganda.html"
  status = 200
